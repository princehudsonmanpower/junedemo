<svg xmlns="http://www.w3.org/2000/svg" width="26" height="32" viewBox="0 0 26 32">
  <!-- Index finger (first finger, on the left/front side) pointing up -->
  <rect x="5" y="1" width="6.5" height="16" rx="3.25" fill="#E8A020" stroke="#1C1C20" stroke-width="1.2"/>
  <!-- Fingernail on index -->
  <rect x="6" y="2" width="4.5" height="3.5" rx="2.25" fill="#F5C96A" stroke="none"/>
  <!-- Middle finger (tucked behind) -->
  <rect x="11" y="10" width="5.5" height="9" rx="2.75" fill="#D4900A" stroke="#1C1C20" stroke-width="1.2"/>
  <!-- Ring finger (tucked) -->
  <rect x="16" y="11.5" width="5" height="8" rx="2.5" fill="#C8850A" stroke="#1C1C20" stroke-width="1.2"/>
  <!-- Palm / hand base -->
  <rect x="3" y="15" width="20" height="12" rx="5" fill="#E8A020" stroke="#1C1C20" stroke-width="1.2"/>
  <!-- Thumb (sticking out to the left) -->
  <rect x="0.5" y="17" width="5" height="7.5" rx="2.5" fill="#E8A020" stroke="#1C1C20" stroke-width="1.2" transform="rotate(-20 3 21)"/>
  <!-- Knuckle detail lines -->
  <line x1="8" y1="20" x2="18" y2="20" stroke="#D4900A" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="9" y1="23" x2="17" y2="23" stroke="#D4900A" stroke-width="0.6" stroke-linecap="round"/>
</svg>
